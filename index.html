<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Lotto, Fortune & Lunch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="clover-container" class="clover-background"></div>
  
  <div class="container">
    <header>
      <h1>LOTTO <span>PREMIUM</span></h1>
      <p>오늘의 운세와 점심 메뉴, 행운의 번호까지 한 번에!</p>
    </header>

    <div class="cards-wrapper">
      <div id="fortune-container" class="info-card fortune-card" style="display: none;">
        <div class="card-title">✨ 오늘의 운세</div>
        <div id="fortune-text" class="card-content"></div>
      </div>

      <div id="lunch-container" class="info-card lunch-card" style="display: none;">
        <div class="card-title">🍱 오늘의 추천 점심</div>
        <div id="lunch-text" class="card-content"></div>
      </div>
    </div>
    
    <div class="action-area">
      <button id="generate">
        <span class="btn-text">행운 가득 추천 받기</span>
        <span class="btn-shine"></span>
      </button>
    </div>

    <div id="numbers" class="numbers-grid"></div>
  </div>
  
  <script type="text/javascript" src="main.js"></script>
</body>
</html>
